name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.1.2'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Verify release version metadata
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));

          const errors = [];
          if (manifest.version !== version) errors.push(`manifest.json version ${manifest.version} does not match ${version}`);
          if (pkg.version !== version) errors.push(`package.json version ${pkg.version} does not match ${version}`);
          if (!versions[version]) errors.push(`versions.json does not contain ${version}`);
          if (errors.length) {
            console.error(errors.join('\n'));
            process.exit(1);
          }
          NODE

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          assets=(main.js manifest.json)
          if [[ -f styles.css ]]; then
            assets+=(styles.css)
          fi
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete-asset "$VERSION" versions.json \
              --repo "$GITHUB_REPOSITORY" \
              --yes || true
            gh release upload "$VERSION" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$VERSION" \
              --notes "Release $VERSION."
          else
            gh release create "$VERSION" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$VERSION" \
              --notes "Release $VERSION."
          fi

      - name: Attest main.js provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest manifest.json provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: manifest.json

      - name: Attest styles.css provenance
        if: ${{ hashFiles('styles.css') != '' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css
